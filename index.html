<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大易實體鍵盤轉接器 | iPad 離線完整版</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon.png" type="image/png">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --glass: rgba(30, 41, 59, 0.85);
            --glass-border: rgba(255, 255, 255, 0.12);
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --accent: #f43f5e;
            --success: #10b981;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Heiti TC", sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(244, 63, 94, 0.1) 0%, transparent 40%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow-y: auto;
        }

        .container {
            width: 100%;
            max-width: 850px;
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        header { margin-bottom: 20px; text-align: center; }
        h1 { font-size: 24px; font-weight: 700; color: #fff; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .version-line { font-size: 11px; color: var(--text-muted); display: flex; justify-content: center; align-items: center; gap: 20px; }

        #display-area {
            width: 100%;
            min-height: 110px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 18px;
            font-size: 24px;
            line-height: 1.5;
            margin-bottom: 15px;
            overflow-y: auto;
            word-wrap: break-word;
            font-weight: 400;
            position: relative;
        }

        #display-area::after { content: ''; display: inline-block; width: 2px; height: 26px; background-color: var(--primary); margin-left: 2px; vertical-align: middle; animation: blink 1.1s step-end infinite; }
        @keyframes blink { from, to { opacity: 1; } 50% { opacity: 0; } }

        .action-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; min-height: 44px; }
        .composition-area { display: flex; align-items: center; gap: 10px; }
        .root-tag { background: rgba(99, 102, 241, 0.1); border: 1px solid var(--primary); padding: 4px 10px; border-radius: 8px; font-size: 16px; color: #a5b4fc; font-weight: 600; }
        #dict-status { font-size: 11px; background: rgba(16, 185, 129, 0.15); color: var(--success); padding: 4px 12px; border-radius: 8px; border: 1px solid rgba(16, 185, 129, 0.2); font-weight: 600; }

        #candidates-container { min-height: 68px; background: rgba(0, 0, 0, 0.25); border-radius: 16px; padding: 10px; margin-bottom: 25px; display: flex; align-items: center; overflow-x: auto; }
        #candidates { display: flex; gap: 10px; }
        .candidate { display: flex; align-items: center; gap: 6px; padding: 8px 16px; background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 12px; cursor: pointer; transition: 0.2s; }
        .candidate.active, .candidate:hover { background: rgba(99, 102, 241, 0.25); border-color: var(--primary); }
        .candidate-char { font-size: 20px; font-weight: 600; color: #fff; }

        .hint-box { background: rgba(255, 255, 255, 0.02); border-radius: 18px; padding: 20px; border: 1px solid rgba(255, 255, 255, 0.04); }
        .hint-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; font-size: 13px; color: var(--text-muted); }
        .key-cap { background: #334155; padding: 2px 7px; border-radius: 6px; color: #fff; font-weight: 700; font-size: 11px; border: 1px solid #475569; }

        #copy-toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--success); color: white; padding: 12px 24px; border-radius: 12px; transition: 0.5s; }
        #copy-toast.show { transform: translateX(-50%) translateY(0); }
        .empty-display::before { content: attr(placeholder); color: var(--text-muted); opacity: 0.4; }

        /* 隱藏的輸入框，用來在 iPad 上捕捉實體鍵盤事件 */
        #hidden-input {
            position: fixed;
            top: -9999px;
            left: -9999px;
            width: 1px;
            height: 1px;
            opacity: 0;
            font-size: 16px; /* 防止 iOS 自動縮放 */
            caret-color: transparent;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>⌨️ 大易實體鍵盤轉接器</h1>
        <div class="version-line">
            <span>版權所有 ＆ 製作：WHY</span>
            <span>VERSION: 260415-0334 (完整 PWA 離線版)</span>
        </div>
    </header>

    <!-- 隱藏的 input，iPad Safari PWA 模式需要一個可聚焦元素才能接收鍵盤事件 -->
    <input id="hidden-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" inputmode="none" aria-hidden="true">
    <div id="display-area" placeholder="點擊此處開始輸入..." class="empty-display"></div>
    
    <div class="action-row">
        <div class="composition-area" id="composition"></div>
        <div class="meta-actions">
            <div id="dict-status">📦 正在載入完整字庫...</div>
        </div>
    </div>

    <div id="candidates-container">
        <div id="candidates"></div>
    </div>

    <div class="hint-box">
        <div class="hint-grid">
            <div class="hint-item"><span class="key-cap">A-Z / 0-9</span> 字根</div>
            <div class="hint-item"><span class="key-cap">Space</span> 1</div>
            <div class="hint-item"><span class="key-cap">'</span> 2</div>
            <div class="hint-item"><span class="key-cap">[</span> 3</div>
            <div class="hint-item"><span class="key-cap">]</span> 4</div>
            <div class="hint-item"><span class="key-cap">-</span> 5</div>
            <div class="hint-item"><span class="key-cap">\</span> 6</div>
            <div class="hint-item"><span class="key-cap">=</span> 標點</div>
            <div class="hint-item"><span class="key-cap">Enter</span> 複製/清空</div>
            <div class="hint-item"><span class="key-cap">⌫</span> 刪除</div>
        </div>
    </div>
</div>

<div id="copy-toast">✅ 已成功複製並清空！</div>

<script>
    const dayiMap = {
        '0': '金', 'i': '木', 'x': '水', 'y': '火', 'f': '土', 'a': '人', 'z': '心', 'o': '口', '1': '言', 'p': '耳',
        '3': '目', 'g': '手', '9': '足', 'l': '女', '2': '牛', 'b': '馬', 'c': '鹿', ',': '犭', ';': '虫', 'n': '魚',
        'h': '鳥', 'd': '日', 'j': '月', 'w': '山', 'q': '石', 'm': '雨', '7': '田', 'v': '禾', '8': '米', '/': '竹',
        'u': '艸', 'r': '工', '6': '車', '.': '舟', 't': '糸', 's': '革', 'k': '立', 'e': '一', '4': '四', '5': '王'
    };
    const selectionKeys = { ' ': 0, "'": 1, "[": 2, "]": 3, "-": 4, "\\": 5 };
    const selectionNames = ["Space", "'", "[", "]", "-", "\\"];
    const punctuationMap = ["。", "，", "「", "」", "！", "、"];

    let dayiDictionary = {};
    let fullSentence = "";
    let currentBuffer = "";
    let candidatesArr = [];
    let isPunctuationMode = false;

    const displayArea = document.getElementById('display-area');
    const compositionArea = document.getElementById('composition');
    const candidatesArea = document.getElementById('candidates');
    const dictStatus = document.getElementById('dict-status');
    const toast = document.getElementById('copy-toast');

    // 離線完整版啟動邏輯
    function startApp() {
        if (typeof DAYI_RAW_DATA !== 'undefined') {
            const lines = DAYI_RAW_DATA.split('\n');
            let count = 0;
            lines.forEach(line => {
                const trimmed = line.trim();
                // 跳過空白行、註解行或 YAML 元件行
                if (!trimmed || trimmed.startsWith('#') || trimmed.startsWith('---') || trimmed.startsWith('...') || trimmed.includes(': ')) return;
                
                let code, char;
                // 嘗試 Rime 格式：字 [TAB/空格] 碼
                // 優先匹配：非空白字元 + 空白 + 大易碼 (英數符號)
                let match = trimmed.match(/^([^\s]+)\s+([a-z0-9,.;/]+)$/i);
                if (match) {
                    char = match[1];
                    code = match[2];
                } else {
                    // 嘗試傳統格式：碼 [TAB/空格] 字
                    match = trimmed.match(/^([a-z0-9,.;/]+)\s+(.+)$/i);
                    if (match) {
                        code = match[1];
                        char = match[2];
                    }
                }

                if (code && char) {
                    if (!dayiDictionary[code]) dayiDictionary[code] = [];
                    if (!dayiDictionary[code].includes(char)) {
                        dayiDictionary[code].push(char);
                        count++;
                    }
                }
            });
            dictStatus.innerText = `✅ 完整字庫已就緒 (${count} 字)`;
        } else {
            dictStatus.innerText = "❌ 警告：未偵測到 dayi_data.js";
            dictStatus.style.background = "rgba(244,63,94,0.1)";
            dictStatus.style.color = "var(--accent)";
        }
        updateUI();
    }

    // ═══════════════════════════════════════════════════════════════
    // iPad Safari PWA 鍵盤焦點修正
    // iPad 在 Standalone 模式下不會對無焦點的頁面發送 keydown 事件
    // 必須用一個隱藏的 <input> 來捕捉鍵盤輸入
    // ═══════════════════════════════════════════════════════════════
    const hiddenInput = document.getElementById('hidden-input');

    function ensureFocus() {
        if (document.activeElement !== hiddenInput) {
            hiddenInput.focus();
        }
    }

    // 點擊頁面任何位置都要保持焦點在 hiddenInput
    document.addEventListener('click', (e) => {
        // 允許候選字按鈕的 onclick 先執行
        setTimeout(ensureFocus, 10);
    });
    document.addEventListener('touchend', (e) => {
        setTimeout(ensureFocus, 10);
    });

    // 監聽鍵盤事件（同時在 hiddenInput 和 document 上綁定，確保雙保險）
    function handleKeyDown(e) {
        const key = e.key;
        const lowerKey = key.toLowerCase();

        // 防止 iPad 的隱藏 input 累積文字
        if (hiddenInput.value) hiddenInput.value = '';

        if ((currentBuffer.length > 0 || isPunctuationMode) && selectionKeys.hasOwnProperty(key)) e.preventDefault();
        if (key === '=') e.preventDefault();
        if (key === 'Backspace') {
            e.preventDefault();
            if (isPunctuationMode) isPunctuationMode = false;
            else if (currentBuffer) currentBuffer = currentBuffer.slice(0, -1);
            else fullSentence = fullSentence.slice(0, -1);
            updateUI(); return;
        }
        if (key === 'Enter') { e.preventDefault(); copySentence(); return; }
        if (key === '=' && currentBuffer.length === 0) { isPunctuationMode = !isPunctuationMode; updateUI(); return; }
        if (selectionKeys.hasOwnProperty(key)) {
            const idx = selectionKeys[key];
            if (isPunctuationMode) {
                if (punctuationMap[idx]) { fullSentence += punctuationMap[idx]; isPunctuationMode = false; updateUI(); }
                return;
            } else if (currentBuffer.length > 0) {
                if (candidatesArr[idx]) confirmCandidate(idx);
                return;
            }
        }
        if (key === ' ' && currentBuffer.length === 0 && !isPunctuationMode) { e.preventDefault(); fullSentence += " "; updateUI(); return; }
        if (dayiMap[lowerKey]) {
            e.preventDefault();
            if (isPunctuationMode) isPunctuationMode = false;
            if (currentBuffer.length < 4) { currentBuffer += lowerKey; updateUI(); }
        }
    }

    hiddenInput.addEventListener('keydown', handleKeyDown);
    document.addEventListener('keydown', handleKeyDown);

    // 補充：若 iPad 的某些按鍵未觸發 keydown，用 input 事件做備援
    hiddenInput.addEventListener('input', (e) => {
        const val = hiddenInput.value;
        if (val) {
            // 逐字處理 input 中累積的文字
            for (const ch of val) {
                const lowerCh = ch.toLowerCase();
                if (dayiMap[lowerCh]) {
                    if (isPunctuationMode) isPunctuationMode = false;
                    if (currentBuffer.length < 4) { currentBuffer += lowerCh; }
                }
            }
            hiddenInput.value = '';
            updateUI();
        }
    });

    function updateUI() {
        displayArea.innerText = fullSentence;
        displayArea.classList.toggle('empty-display', !fullSentence);
        if (isPunctuationMode) compositionArea.innerHTML = '<span class="root-tag" style="background:var(--accent);color:#fff;">標點模式</span>';
        else compositionArea.innerHTML = currentBuffer.split('').map(k => `<span class="root-tag">${dayiMap[k] || k}</span>`).join('');
        candidatesArr = isPunctuationMode ? punctuationMap : (dayiDictionary[currentBuffer] || []);
        candidatesArea.innerHTML = candidatesArr.map((c, i) => `
            <div class="candidate ${i === 0 ? 'active' : ''}" onclick="confirmCandidateOrPunctuation(${i})">
                <span class="candidate-char">${c}</span>
                <span style="font-size: 8px; opacity: 0.4; margin-left: 3px;">(${selectionNames[i]})</span>
            </div>
        `).slice(0, 10).join('');
        displayArea.scrollTop = displayArea.scrollHeight;
        // 保持焦點
        ensureFocus();
    }

    function confirmCandidate(i) { fullSentence += candidatesArr[i]; currentBuffer = ""; updateUI(); }
    function confirmCandidateOrPunctuation(i) {
        if (isPunctuationMode) {
            if (punctuationMap[i]) { fullSentence += punctuationMap[i]; isPunctuationMode = false; updateUI(); }
        } else confirmCandidate(i);
    }
    async function copySentence() {
        if (!fullSentence) return;
        try { await navigator.clipboard.writeText(fullSentence); } catch (e) {
            const el = document.createElement('textarea'); el.value = fullSentence; document.body.appendChild(el);
            el.select(); document.execCommand('copy'); document.body.removeChild(el);
        }
        toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 2000);
        fullSentence = ""; currentBuffer = ""; updateUI();
    }

    // 確保 dayi_data.js 載入後才啟動
    window.addEventListener('load', () => {
        startApp();
        // 啟動後立即聚焦隱藏輸入框
        ensureFocus();
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
            .then(reg => console.log('Service Worker registered', reg))
            .catch(err => console.error('Service Worker error', err));
        }
    });
</script>
<!-- 這裡載入外部巨大的字庫檔案 -->
<script src="dayi_data.js"></script>
</body>
</html>
